  short_description: "Design, build, audit, and refine web interfaces"
  icon_small: "./assets/icon.svg"
  icon_large: "./assets/logo.svg"
  brand_color: "#0B6E69"
  default_prompt: "Use $frontend-taste-engineer to build a distinctive, production-ready frontend."

dependencies:
  tools:
    - type: "mcp"
      value: "frontend-taste-engineer"
      description: "Source-backed frontend knowledge retrieval and audits"
      transport: "stdio"

policy:
  allow_implicit_invocation: true
