interface:
  display_name: "Frontend Taste Engineer"
  short_description: "Paste a rough frontend idea, then polish and run it"
  icon_small: "./assets/icon.svg"
  icon_large: "./assets/logo.svg"
  brand_color: "#0B6E69"
  default_prompt: "Use $frontend-taste-engineer. Treat my next text as a rough frontend request: preserve my intent and literal copy, silently turn it into a clear execution brief, choose the lightest suitable workflow, and run it end to end."

dependencies:
  tools:
    - type: "mcp"
      value: "frontend-taste-engineer"
      description: "Source-backed frontend retrieval, bounded external-source selection, and audits"
      transport: "stdio"

policy:
  allow_implicit_invocation: true
