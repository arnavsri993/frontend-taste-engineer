schema_version: 1
reviewed: "2026-07-10"
source_count: 36
supplied_source_count: 9
status_legend:
  strong: "Multiple primary/authoritative sources support promotion of stable baseline guidance."
  moderate: "Useful primary coverage exists, but specialist depth, implementation examples, or independent evidence should grow."
  limited: "Only partial or context-bound evidence is registered; do not claim comprehensive coverage."
  blocked: "A supplied source is inaccessible; no knowledge is promoted from it."
